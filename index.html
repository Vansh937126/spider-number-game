

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider Number Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <div class="container">
    <h1>🕷 Spider Number Game</h1>
    <p class="rules">
      Enter a number between 0 and 100. <br>

    <div class="input-box">
      <input type="number" id="userNumber" min="0" max="100" placeholder="Enter Number" />
      <button id="submitBtn" onclick="playGame()">Submit</button>
    </div>

    <div id="result" class="result"></div>
  </div>
   
  <script src="script.js"></script>
</body>
</html>
